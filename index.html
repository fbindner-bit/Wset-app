<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSET World Engine | Offline Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div id="app" class="max-w-4xl mx-auto">
        
        <div id="stats-bar" class="hidden grid grid-cols-3 gap-3 mb-10 sticky top-4 z-50">
            <div class="glass p-4 rounded-2xl border-l-4 border-red-800">
                <p class="text-[10px] uppercase opacity-40 tracking-widest">Rolle</p>
                <p id="player-role" class="font-bold text-red-500">-</p>
            </div>
            <div class="glass p-4 rounded-2xl border-l-4 border-yellow-600 text-center">
                <p class="text-[10px] uppercase opacity-40 tracking-widest">Knowledge</p>
                <p id="player-kp" class="font-bold text-yellow-500">100</p>
            </div>
            <div class="glass p-4 rounded-2xl border-l-4 border-gray-400 text-right">
                <p class="text-[10px] uppercase opacity-40 tracking-widest">Region</p>
                <p id="current-location" class="font-bold tracking-tight text-sm">London</p>
            </div>
        </div>

        <div id="screen-setup" class="py-20 text-center animate-in">
            <h1 class="text-6xl serif mb-6 text-white tracking-tight">The WSET Engine</h1>
            <p class="text-gray-500 mb-12 text-lg">Professionel vintjek uden AI-fejl.</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="startGame('Winemaker')" class="glass p-10 rounded-3xl hover:border-red-700 transition text-left group">
                    <div class="text-3xl mb-4">🍇</div>
                    <h2 class="text-xl font-bold group-hover:text-red-500">Winemaker</h2>
                    <p class="text-xs opacity-50 mt-2">Terroir og teknik.</p>
                </button>
                <button onclick="startGame('Sommelier')" class="glass p-10 rounded-3xl hover:border-red-700 transition text-left group">
                    <div class="text-3xl mb-4">🍷</div>
                    <h2 class="text-xl font-bold group-hover:text-red-500">Sommelier</h2>
                    <p class="text-xs opacity-50 mt-2">Smagning og service.</p>
                </button>
                <button onclick="startGame('Sælger')" class="glass p-10 rounded-3xl hover:border-red-700 transition text-left group">
                    <div class="text-3xl mb-4">💰</div>
                    <h2 class="text-xl font-bold group-hover:text-red-500">Sælger</h2>
                    <p class="text-xs opacity-50 mt-2">Handel og lovgivning.</p>
                </button>
            </div>
        </div>

        <div id="screen-map" class="hidden space-y-8 animate-in">
            <div class="flex justify-between items-baseline border-b border-white/5 pb-4">
                <h2 class="text-3xl serif italic text-red-50">Vælg Destination</h2>
                <button onclick="resetGame()" class="text-[10px] opacity-20 hover:opacity-100 uppercase tracking-widest">Nulstil</button>
            </div>
            <div id="region-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="screen-quest" class="hidden max-w-xl mx-auto animate-in">
            <div class="glass p-10 rounded-[2rem] relative overflow-hidden shadow-2xl">
                <div id="quest-content">
                    <h2 id="quest-title" class="text-3xl serif text-white mb-6 leading-tight"></h2>
                    <p id="quest-desc" class="text-gray-400 text-lg leading-relaxed mb-10"></p>
                    <div id="quest-options" class="space-y-4"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let player = { role: "", kp: 100, location: "London" };

        const questions = {
            "Bourgogne": [
                { title: "Klimatiske udfordringer", desc: "Hvilket fænomen er den største trussel mod høstudbyttet i Chablis om foråret?", options: [{t: "Forårsfrost", p: 20}, {t: "Coulure", p: -10}] },
                { title: "Klassifikation", desc: "Hvilket niveau i hierarkiet refererer til en specifik mark (climat) af højeste kvalitet?", options: [{t: "Grand Cru", p: 20}, {t: "Premier Cru", p: -10}] }
            ],
            "Mosel": [
                { title: "Terroir", desc: "Hvilken type jordbund er mest karakteristisk for de bedste stejle skråninger i Mosel?", options: [{t: "Skifer (Slate)", p: 20}, {t: "Grus", p: -10}] },
                { title: "Prädikat", desc: "Hvilken betegnelse indikerer en vin lavet på fuldt modne druer, ofte høstet senere end Kabinett?", options: [{t: "Spätlese", p: 20}, {t: "Trocken", p: -10}] }
            ],
            "Rioja": [
                { title: "Lagring", desc: "Hvor længe skal en rød Rioja Reserva minimum lagre (fad + flaske i alt)?", options: [{t: "36 måneder", p: 20}, {t: "24 måneder", p: -10}] },
                { title: "Druer", desc: "Hvilken drue udgør typisk hovedparten i en klassisk rød Rioja?", options: [{t: "Tempranillo", p: 20}, {t: "Garnacha", p: -10}] }
            ],
            "Champagne": [
                { title: "Metode", desc: "Hvad kaldes processen, hvor gærsedimentet samles i flaskehalsen før degorgering?", options: [{t: "Remuage (Riddling)", p: 20}, {t: "Assemblage", p: -10}] }
            ]
        };

        const regions = [
            { id: "bourgogne", name: "Bourgogne", info: "Pinot Noir & Chardonnay" },
            { id: "mosel", name: "Mosel", info: "Riesling & Stejle bjerge" },
            { id: "rioja", name: "Rioja", info: "Tempranillo & Eg" },
            { id: "champagne", name: "Champagne", info: "Bobler & Kalk" }
        ];

        window.onload = () => {
            const saved = localStorage.getItem('wsetStaticV1');
            if (saved) {
                Object.assign(player, JSON.parse(saved));
                updateUI();
                showMap();
            }
        };

        function updateUI() {
            document.getElementById('player-role').innerText = player.role;
            document.getElementById('player-kp').innerText = player.kp;
            document.getElementById('current-location').innerText = player.location;
            document.getElementById('stats-bar').classList.remove('hidden');
            document.getElementById('screen-setup').classList.add('hidden');
        }

        function startGame(role) {
            player.role = role;
            updateUI();
            localStorage.setItem('wsetStaticV1', JSON.stringify(player));
            showMap();
        }

        function showMap() {
            document.getElementById('screen-map').classList.remove('hidden');
            document.getElementById('screen-quest').classList.add('hidden');
            const list = document.getElementById('region-list');
            list.innerHTML = "";
            regions.forEach(r => {
                list.innerHTML += `
                    <button onclick="enterRegion('${r.name}')" class="glass p-6 rounded-2xl hover:bg-white/5 transition text-left group border-white/5">
                        <p class="font-bold text-lg group-hover:text-red-500 transition">${r.name}</p>
                        <p class="text-[10px] opacity-30 uppercase tracking-widest mt-1">${r.info}</p>
                    </button>`;
            });
        }

        function enterRegion(name) {
            player.location = name;
            updateUI();
            document.getElementById('screen-map').classList.add('hidden');
            document.getElementById('screen-quest').classList.remove('hidden');
            
            const regionQuests = questions[name] || questions["Bourgogne"];
            const quest = regionQuests[Math.floor(Math.random() * regionQuests.length)];

            document.getElementById('quest-title').innerText = quest.title;
            document.getElementById('quest-desc').innerText = quest.desc;
            
            const optionsDiv = document.getElementById('quest-options');
            optionsDiv.innerHTML = "";
            quest.options.forEach(o => {
                optionsDiv.innerHTML += `
                    <button onclick="resolveQuest(${o.p})" class="w-full glass p-5 rounded-2xl text-left hover:bg-red-900/20 hover:border-red-500 transition text-sm">
                        ${o.t}
                    </button>`;
            });
        }

        function resolveQuest(p) {
            player.kp += p;
            localStorage.setItem('wsetStaticV1', JSON.stringify(player));
            alert(p > 0 ? "Korrekt!" : "Forkert svar.");
            updateUI();
            showMap();
        }

        function resetGame() {
            localStorage.removeItem('wsetStaticV1');
            location.reload();
        }
    </script>
</body>
</html>
